<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Capsule Corp | Secure Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; background-color: #050510;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Share Tech Mono', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        
        /* Floating background elements */
        .glow-orb { position: absolute; border-radius: 50%; filter: blur(80px); z-index: 0; }
        .orb-1 { width: 400px; height: 400px; background: rgba(248, 91, 26, 0.2); top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(7, 32, 131, 0.3); bottom: -150px; right: -100px; }

        .card {
            width: 400px; padding: 40px; 
            background: rgba(10, 15, 30, 0.7); /* Glassmorphism */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2); 
            border-radius: 15px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1), inset 0 0 20px rgba(0, 255, 255, 0.05);
            position: relative; z-index: 10;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif; color: #0ff; 
            margin: 0 0 5px 0; font-size: 24px; letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .subtitle { color: #888; font-size: 12px; margin-bottom: 30px; letter-spacing: 2px; }

        /* The Face ID Radar */
        .radar {
            width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 30px;
            border: 2px solid #F85B1A; position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(248, 91, 26, 0.4);
            background: rgba(0,0,0,0.5);
        }
        .radar::after {
            content: ''; position: absolute; top: 0; left: 50%;
            width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(248, 91, 26, 0.6));
            transform-origin: left center; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input { 
            width: 100%; padding: 15px; margin-bottom: 20px; 
            background: rgba(0, 0, 0, 0.5); border: 1px solid #333; 
            color: #fff; border-radius: 8px; box-sizing: border-box; 
            font-family: 'Share Tech Mono', monospace; font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: #0ff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }

        button { 
            width: 100%; padding: 15px; 
            background: transparent; border: 2px solid #F85B1A; 
            color: #F85B1A; border-radius: 8px; cursor: pointer; 
            font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: bold;
            letter-spacing: 2px; transition: all 0.3s ease;
            position: relative; overflow: hidden; margin-bottom: 15px;
        }
        button:hover { background: #F85B1A; color: #000; box-shadow: 0 0 20px #F85B1A; }
        
        .toggle-link { color: #0ff; font-size: 12px; cursor: pointer; margin-top: 15px; display: block; opacity: 0.8; transition: 0.3s;}
        .toggle-link:hover { opacity: 1; text-shadow: 0 0 8px #0ff; }
        
        #login-status, #reg-status { margin-top: 15px; min-height: 20px; font-size: 14px;}
        .success { color: #0f0; text-shadow: 0 0 8px #0f0;}
        .error { color: #f00; text-shadow: 0 0 8px #f00;}
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="card" id="login-form">
        <h1>DRAGON BALL</h1>
        <div class="subtitle">CAPSULE CORP</div>
        
        <div class="radar"></div>
        
        <input type="text" id="login-user" placeholder="ENTER ID (e.g., irfan)" value="irfan">
        <input type="password" id="login-pass" placeholder="PASSWORD" value="irfan">
        
        <button onclick="doLogin()" id="login-btn">LOGIN</button>
        
        <div id="login-status"></div>
        <span class="toggle-link" onclick="toggleMode()">[ REGISTER NEW SAIYAN ]</span>
    </div>

    <div class="card hidden" id="register-form">
        <h1>NEW REGISTRY</h1>
        <div class="subtitle">BIOMETRIC PAIRING REQUIRED</div>
        
        <input type="text" id="reg-user" placeholder="CHOOSE USER">
        <input type="password" id="reg-pass" placeholder="CREATE PASSWORD">
        
        <button onclick="doRegister()" id="reg-btn">REGISTER</button>
        
        <div id="reg-status"></div>
        <span class="toggle-link" onclick="toggleMode()">[ ABORT - RETURN TO LOGIN ]</span>
    </div>

    <script>
        // --- CRITICAL IP ADDRESS UPDATE ---
        const API_URL = 'http://192.168.0.59:3000';

        function toggleMode() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
            document.getElementById('login-status').innerText = "";
            document.getElementById('reg-status').innerText = "";
        }

        async function doRegister() {
            const user = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;
            const status = document.getElementById('reg-status');

            if(!user || !pass) { status.innerText = "[ ERR: FIELDS REQUIRED ]"; status.className = "error"; return; }

            status.innerText = "[ ENCRYPTING DATA... ]";
            status.className = "success";

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (data.success) {
                    status.innerText = "[ REGISTRATION SUCCESS ]";
                    status.className = "success";
                    setTimeout(toggleMode, 1500); 
                } else {
                    status.innerText = "[ ERR: " + (data.error || "FAILED") + " ]";
                    status.className = "error";
                }
            } catch (err) {
                status.innerText = "[ SYSTEM OFFLINE ]"; status.className = "error"; 
            }
        }

        async function doLogin() {
            const user = document.getElementById('login-user').value;
            const status = document.getElementById('login-status');
            const btn = document.getElementById('login-btn');

            if(!user) { status.innerText = "[ ERR: ID REQUIRED ]"; status.className="error"; return; }

            btn.disabled = true;
            status.innerText = "[ AWAITING DEVICE AUTHENTICATION... ]";
            status.className = "success";

            try {
                const loginRes = await fetch(`${API_URL}/login-init`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user })
                });
                
                if(!loginRes.ok) throw new Error("Network issue");

                const interval = setInterval(async () => {
                    try {
                        const check = await fetch(`${API_URL}/check-status?username=${user}`);
                        const data = await check.json();

                        if (data.status === 'approved') {
                            clearInterval(interval); 
                            // CRITICAL LINE: Saves the username so the dashboard knows who logged in!
                            localStorage.setItem('capsule_user', user); 
                            window.location.href = 'dashboard.html';
                        } 
                        else if (data.status === 'denied') {
                            clearInterval(interval);
                            status.innerText = "[ AUTHENTICATION REJECTED ]";
                            status.className = "error";
                            btn.disabled = false;
                        }
                    } catch(e) {}
                }, 1000);

            } catch(e) { 
                status.innerText = "[ SYSTEM OFFLINE ]"; 
                status.className="error"; 
                btn.disabled = false; 
            }
        }
    </script>
</body>
</html>
